name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.2)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build app bundle
        run: |
          chmod +x scripts/build_app_bundle.sh
          bash scripts/build_app_bundle.sh

      - name: Create zip for release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          ditto -c -k --keepParent build/VoiceText.app "build/VoiceText-${VERSION_NUM}-macos.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: build/VoiceText-*-macos.zip
          fail_on_unmatched: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
